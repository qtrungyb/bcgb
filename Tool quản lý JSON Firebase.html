<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool quản lý JSON Firebase</title>
    <style>
        /* CSS Flat Design UI */
        :root {
            --primary: #3498db;      /* Peter River */
            --primary-hover: #2980b9;/* Belize Hole */
            --success: #2ecc71;      /* Emerald */
            --success-hover: #27ae60;/* Nephritis */
            --dark: #34495e;         /* Wet Asphalt */
            --bg-body: #ecf0f1;      /* Clouds */
            --bg-input: #bdc3c7;     /* Silver (lightened in use) */
            --text-main: #2c3e50;    /* Midnight Blue */
            --danger: #e74c3c;       /* Alizarin */
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            /* Flat design shadow: sắc nét, không blur */
            box-shadow: 8px 8px 0px rgba(52, 73, 94, 0.1);
        }

        h2 {
            color: var(--dark);
            margin-top: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 6px solid var(--primary);
            padding-left: 15px;
        }

        h3 {
            color: var(--dark);
            font-weight: 600;
            margin-top: 0;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px dashed #ecf0f1;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        /* Flat Inputs */
        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background-color: #f8f9fa;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, select:focus {
            background-color: #ffffff;
            border-color: var(--primary);
            outline: none;
        }

        /* Flat Buttons */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: translateY(2px);
        }

        button.btn-success {
            background-color: var(--success);
            width: 100%;
            font-size: 18px;
            padding: 20px;
            margin-top: 10px;
        }

        button.btn-success:hover {
            background-color: var(--success-hover);
        }

        /* Layout */
        .row {
            display: flex;
            gap: 20px;
        }
        .col {
            flex: 1;
        }

        /* Status & Messages */
        #status, #msgUser, #msgList {
            margin-top: 10px;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 0;
        }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        
        /* Flat Tabs */
        .tabs { 
            display: flex; 
            gap: 0; 
            margin-bottom: 30px; 
            background: #ecf0f1;
            border-radius: 6px;
            overflow: hidden;
        }
        .tab-btn {
            background: transparent;
            color: var(--text-main);
            flex: 1;
            border-radius: 0;
            padding: 18px;
        }
        .tab-btn:hover {
            background: #dfe6e9;
        }
        .tab-btn.active {
            background: var(--dark);
            color: #fff;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Quản Lý Dữ Liệu Hệ Thống</h2>
    
    <div class="section">
        <label>1. TẢI LÊN DATABASE JSON</label>
        <input type="file" id="fileInput" accept=".json">
        <div id="status">Chờ nhận file...</div>
    </div>

    <div id="editorSection" style="display: none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-users', this)">QUẢN LÝ USER</button>
            <button class="tab-btn" onclick="switchTab('tab-lists', this)">CẤU HÌNH DANH MỤC</button>
        </div>

        <div id="tab-users" class="tab-content active section">
            <h3>Thêm / Cập Nhật User</h3>
            <div class="row">
                <div class="col">
                    <label>ID User (vd: bsanh, ktvhoa):</label>
                    <input type="text" id="u_id" placeholder="Nhập ID (key trong JSON)">
                </div>
                <div class="col">
                    <label>Username (để đăng nhập):</label>
                    <input type="text" id="u_username" placeholder="Nhập Username">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label>Họ và Tên:</label>
                    <input type="text" id="u_fullname" placeholder="vd: BS. Trần Ngọc Ánh">
                </div>
                <div class="col">
                    <label>Role (Quyền hệ thống):</label>
                    <select id="u_role">
                        <option value="viewer">Viewer (Chỉ xem)</option>
                        <option value="editor">Editor (Bác sĩ/KTV)</option>
                        <option value="quantri">Quản trị (Trưởng phòng/Lãnh đạo)</option>
                        <option value="admin">Admin (IT)</option>
                    </select>
                </div>
            </div>
            <label>Chức danh hiển thị (Role Display Name):</label>
            <input type="text" id="u_roleDisplay" placeholder="vd: Bác sĩ, KTV, TRƯỞNG PHÒNG KHTH...">
            <button onclick="addUser()">+ LƯU USER</button>
            <div id="msgUser"></div>
        </div>

        <div id="tab-lists" class="tab-content section">
            <h3>Thêm Dữ Liệu Bổ Sung</h3>
            <div class="row">
                <div class="col">
                    <label>Chọn danh mục cần thêm:</label>
                    <select id="list_target">
                        <optgroup label="Autocomplete (Gợi ý gõ)">
                            <option value="chanDoan">Chẩn đoán bệnh</option>
                            <option value="diaChi">Địa chỉ</option>
                        </optgroup>
                        <optgroup label="Nhân sự (Staff)">
                            <option value="staff_lanhDao">Lãnh đạo</option>
                            <option value="staff_chuyenMon">Chuyên môn</option>
                            <option value="staff_bacSi">Bác sĩ</option>
                            <option value="staff_nguoiLamBaoCao">Người làm báo cáo</option>
                            <option value="staff_xetNghiem">Xét nghiệm (KTV)</option>
                            <option value="staff_cdha">CĐHA (KTV)</option>
                            <option value="staff_anNinh">An ninh</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col">
                    <label>Giá trị mới:</label>
                    <input type="text" id="list_value" placeholder="Nhập nội dung cần thêm...">
                </div>
            </div>
            <button onclick="addToList()">+ THÊM VÀO DANH MỤC</button>
            <div id="msgList"></div>
        </div>

        <div class="section" style="border: none; padding-bottom: 0;">
            <button class="btn-success" onclick="exportJSON()">XUẤT DATABASE JSON</button>
        </div>
    </div>
</div>

<script>
    let dbData = null;

    // Xử lý upload file
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                dbData = JSON.parse(e.target.result);
                document.getElementById('status').innerHTML = '<span class="text-success">✔ Đã nạp Database thành công.</span>';
                document.getElementById('editorSection').style.display = 'block';
            } catch (err) {
                document.getElementById('status').innerHTML = '<span class="text-danger">✖ File không đúng định dạng JSON.</span>';
            }
        };
        reader.readAsText(file);
    });

    // Chuyển Tab
    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    // Thêm User
    function addUser() {
        if (!dbData) return;
        
        const id = document.getElementById('u_id').value.trim();
        const username = document.getElementById('u_username').value.trim();
        const fullname = document.getElementById('u_fullname').value.trim();
        const role = document.getElementById('u_role').value;
        const roleDisplay = document.getElementById('u_roleDisplay').value.trim();
        const msg = document.getElementById('msgUser');

        if (!id || !username || !fullname || !roleDisplay) {
            msg.innerHTML = '<span class="text-danger">✖ Vui lòng điền đầy đủ các trường thông tin.</span>';
            return;
        }

        if (dbData.users[id]) {
            if(!confirm(`User ID "${id}" đã tồn tại. Bạn có muốn cập nhật thông tin không?`)) {
                return;
            }
        }

        dbData.users[id] = {
            username: username,
            fullname: fullname,
            role: role,
            roleDisplayName: roleDisplay
        };

        msg.innerHTML = `<span class="text-success">✔ Đã lưu thông tin User: ${fullname}</span>`;
        
        // Reset form
        document.getElementById('u_id').value = '';
        document.getElementById('u_username').value = '';
        document.getElementById('u_fullname').value = '';
        document.getElementById('u_roleDisplay').value = '';
        
        setTimeout(() => { msg.innerHTML = ''; }, 3000);
    }

    // Thêm vào Mảng (Chẩn đoán, Địa chỉ, Staff...)
    function addToList() {
        if (!dbData) return;

        const target = document.getElementById('list_target').value;
        const value = document.getElementById('list_value').value.trim();
        const msg = document.getElementById('msgList');

        if (!value) {
            msg.innerHTML = '<span class="text-danger">✖ Vui lòng nhập giá trị cần thêm.</span>';
            return;
        }

        let targetArray = null;

        if (target === 'chanDoan' || target === 'diaChi') {
            targetArray = dbData.settings.autocomplete[target];
        } else if (target.startsWith('staff_')) {
            const staffKey = target.replace('staff_', '');
            targetArray = dbData.settings.staff[staffKey];
        }

        if (targetArray) {
            if (targetArray.includes(value)) {
                msg.innerHTML = '<span class="text-danger">✖ Dữ liệu này đã tồn tại trong hệ thống.</span>';
                return;
            }
            
            targetArray.push(value);
            targetArray.sort((a, b) => a.localeCompare(b, 'vi'));

            msg.innerHTML = `<span class="text-success">✔ Đã thêm "${value}" thành công.</span>`;
            document.getElementById('list_value').value = '';
            setTimeout(() => { msg.innerHTML = ''; }, 3000);
        } else {
            msg.innerHTML = '<span class="text-danger">✖ Lỗi: Không tìm thấy node tương ứng trong JSON.</span>';
        }
    }

    // Xuất file JSON
    function exportJSON() {
        if (!dbData) {
            alert('Chưa có dữ liệu để xuất!');
            return;
        }

        const dataStr = JSON.stringify(dbData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        
        const date = new Date();
        const timestamp = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}_${date.getHours()}${date.getMinutes()}`;
        
        a.download = `Database_Updated_${timestamp}.json`;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 0);
    }
</script>

</body>
</html>
